# Decap CMS (Git-based) — enable Identity / Git Gateway on your host, or use local backend.
backend:
  name: git-gateway
  branch: main

# Uncomment for local editing without Netlify Identity:
# local_backend: true

media_folder: src/assets/img
public_folder: /assets/img

collections:
  - name: news
    label: News
    folder: src/news/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title EN, name: title_en, widget: string }
      - { label: Title VI, name: title_vi, widget: string }
      - { label: Title ZH, name: title_zh, widget: string }
      - { label: Category EN, name: category_en, widget: string }
      - { label: Category VI, name: category_vi, widget: string }
      - { label: Category ZH, name: category_zh, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Image, name: image, widget: image }
      - { label: Body, name: body, widget: markdown }

  - name: products
    label: Products
    folder: src/products/items
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Code, name: code, widget: string }
      - { label: Order, name: order, widget: number }
      - { label: Color, name: color, widget: string }
      - { label: Title EN, name: title_en, widget: string }
      - { label: Title VI, name: title_vi, widget: string }
      - { label: Title ZH, name: title_zh, widget: string }
      - { label: Summary EN, name: summary_en, widget: text }
      - { label: Summary VI, name: summary_vi, widget: text }
      - { label: Summary ZH, name: summary_zh, widget: text }
